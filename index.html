<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legumes Cortados</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #DFE4DF; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const G = '#2D6A4F';
    const GD = '#1B4332';
    const GL = '#D8F3DC';
    const TXT = '#1A1A1A';
    const T2 = '#555';
    const T3 = '#9E9E9E';
    const BD = '#EBEBEB';
    const BG = '#F5F6F5';
    const fmt = n => `R$ ${n.toFixed(2).replace('.', ',')}`;

    const PRODUCTS = [
      { id:'1',  name:'Cenoura em cubos',    weight:'300g', price:5.00,  cat:'legumes',  emoji:'🥕', bg:'#FFF3E0', badge:true },
      { id:'2',  name:'Batata em cubos',     weight:'500g', price:7.00,  cat:'legumes',  emoji:'🥔', bg:'#FFFDE7', badge:true },
      { id:'3',  name:'Brócolis floretes',   weight:'300g', price:8.00,  cat:'verduras', emoji:'🥦', bg:'#E8F5E9', badge:true },
      { id:'4',  name:'Abóbora em cubos',    weight:'400g', price:6.00,  cat:'legumes',  emoji:'🎃', bg:'#FFF3E0' },
      { id:'5',  name:'Vagem picada',        weight:'200g', price:6.00,  cat:'verduras', emoji:'🫛', bg:'#F1F8E9' },
      { id:'6',  name:'Cebola picada',       weight:'200g', price:4.00,  cat:'temperos', emoji:'🧅', bg:'#F9F0FF' },
      { id:'7',  name:'Alho poró fatiado',   weight:'100g', price:4.50,  cat:'temperos', emoji:'🌾', bg:'#F1F8E9' },
      { id:'8',  name:'Beterraba em cubos',  weight:'300g', price:5.50,  cat:'legumes',  emoji:'🫐', bg:'#FCE4EC' },
      { id:'9',  name:'Mix de verduras',     weight:'300g', price:11.90, cat:'verduras', emoji:'🥬', bg:'#E8F5E9' },
      { id:'10', name:'Pimentão colorido',   weight:'350g', price:13.90, cat:'legumes',  emoji:'🫑', bg:'#FFEBEE' },
      { id:'11', name:'Cheiro verde',        weight:'50g',  price:4.90,  cat:'temperos', emoji:'🌿', bg:'#E8F5E9' },
      { id:'12', name:'Mandioca em cubos',   weight:'500g', price:10.90, cat:'legumes',  emoji:'🌽', bg:'#FFFDE7' },
    ];

    const KITS = [
      { id:'k1', name:'Kit Sopa',     desc:'Tudo para uma sopa deliciosa', price:24.90, emoji:'🍲', bg:'#FFF3E0' },
      { id:'k2', name:'Kit Refogado', desc:'Praticidade para o seu dia',   price:19.90, emoji:'🥘', bg:'#E8F5E9' },
    ];

    const DATES = [
      { val:'amanha', label:'Amanhã', sub:'21/05' },
      { val:'quinta', label:'Quinta', sub:'22/05' },
      { val:'sexta',  label:'Sexta',  sub:'23/05' },
      { val:'sabado', label:'Sábado', sub:'24/05' },
    ];

    function App() {
      const [screen, setScreen]       = useState('home');
      const [cart, setCart]           = useState({});
      const [catFilter, setCatFilter] = useState('Todos');
      const [search, setSearch]       = useState('');
      const [step, setStep]           = useState(1);
      const [form, setForm]           = useState({ name:'', phone:'', address:'', number:'', complement:'', bairro:'', delivery:'', payment:'' });

      const cartItems = PRODUCTS.filter(p => (cart[p.id]||0) > 0).map(p => ({ ...p, qty: cart[p.id] }));
      const cartCount = Object.values(cart).reduce((s,q) => s+q, 0);
      const cartTotal = cartItems.reduce((s,i) => s + i.price * i.qty, 0);

      const add = id => setCart(c => ({ ...c, [id]: (c[id]||0)+1 }));
      const dec = id => setCart(c => ({ ...c, [id]: Math.max(0,(c[id]||0)-1) }));
      const rm  = id => setCart(c => { const n={...c}; delete n[id]; return n; });
      const go  = s  => { setScreen(s); if(s==='checkout') setStep(1); };
      const upd = (f,v) => setForm(x => ({ ...x, [f]: v }));

      const Img = ({ p, size=64 }) => (
        <div style={{ width:size, height:size, borderRadius:14, background:p.bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.44, flexShrink:0 }}>
          {p.emoji}
        </div>
      );

      const Stepper = ({ id, qty }) => (
        <div style={{ display:'flex', alignItems:'center', border:`1.5px solid ${BD}`, borderRadius:10, overflow:'hidden', background:'#fff' }}>
          <button onClick={()=>dec(id)} style={{ width:32, height:32, background:'none', border:'none', fontSize:18, cursor:'pointer', color:TXT, display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
          <span style={{ width:26, textAlign:'center', fontSize:13, fontWeight:700, color:TXT }}>{qty||0}</span>
          <button onClick={()=>add(id)} style={{ width:32, height:32, background:'none', border:'none', fontSize:18, cursor:'pointer', color:TXT, display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
        </div>
      );

      const CartIcon = ({ onClick }) => (
        <button onClick={onClick} style={{ background:'none', border:'none', cursor:'pointer', position:'relative', padding:4, lineHeight:1 }}>
          <span style={{ fontSize:22 }}>🛒</span>
          {cartCount > 0 && (
            <span style={{ position:'absolute', top:0, right:0, background:G, color:'#fff', borderRadius:'50%', width:17, height:17, fontSize:10, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center' }}>
              {cartCount > 9 ? '9+' : cartCount}
            </span>
          )}
        </button>
      );

      const GreenBtn = ({ label, onClick, disabled=false }) => (
        <button onClick={onClick} disabled={disabled} style={{ width:'100%', background: disabled ? '#C8D8C8' : G, color:'#fff', border:'none', borderRadius:14, padding:'15px', fontSize:14, fontWeight:800, cursor: disabled ? 'default' : 'pointer', letterSpacing:'0.8px', fontFamily:'inherit' }}>
          {label}
        </button>
      );

      const Divider = () => <div style={{ height:1, background:BD }} />;

      const Header = ({ title, back, backFn, right }) => (
        <div style={{ padding:'10px 18px', display:'flex', justifyContent:'space-between', alignItems:'center', background:'#fff', borderBottom:`1px solid ${BD}`, flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {back && (
              <button onClick={backFn} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:TXT, padding:'0 6px 0 0', lineHeight:1 }}>‹</button>
            )}
            {title === 'logo' ? (
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ width:34, height:34, borderRadius:'50%', background:G, display:'flex', alignItems:'center', justifyContent:'center', fontSize:17 }}>🌿</div>
                <div>
                  <div style={{ fontSize:14, fontWeight:800, color:TXT, lineHeight:1.1 }}>Legumes</div>
                  <div style={{ fontSize:11, fontWeight:700, color:G, lineHeight:1 }}>Cortados</div>
                </div>
              </div>
            ) : (
              <span style={{ fontSize:17, fontWeight:700, color:TXT }}>{title}</span>
            )}
          </div>
          {right}
        </div>
      );

      // HOME
      const renderHome = () => {
        const featured = PRODUCTS.filter(p => p.badge);
        return (
          <div style={{ background:'#fff', paddingBottom:16 }}>
            <Header title="logo" right={<CartIcon onClick={()=>go('cart')} />} />
            <div style={{ margin:'14px 14px 16px', borderRadius:22, background:`linear-gradient(140deg, ${GD} 0%, ${G} 100%)`, padding:'24px 22px 22px', overflow:'hidden', position:'relative' }}>
              <div style={{ position:'absolute', right:-8, top:-8, fontSize:88, opacity:0.12, transform:'rotate(-15deg)' }}>🥦</div>
              <div style={{ fontSize:23, fontWeight:900, color:'#fff', lineHeight:1.2, marginBottom:8 }}>
                Legumes prontos<br/>para usar,<br/><span style={{ color:'#74C69D' }}>direto na sua casa</span>
              </div>
              <div style={{ fontSize:12, color:'rgba(255,255,255,0.72)', marginBottom:18, lineHeight:1.5 }}>
                Higienizados, cortados e embalados<br/>com carinho para facilitar o seu dia.
              </div>
              <button onClick={()=>go('products')} style={{ background:'#fff', color:GD, border:'none', borderRadius:11, padding:'11px 22px', fontSize:13, fontWeight:800, cursor:'pointer', letterSpacing:'0.5px', display:'inline-flex', alignItems:'center', gap:6, fontFamily:'inherit' }}>
                VER PRODUTOS ›
              </button>
            </div>

            <div style={{ display:'flex', padding:'0 6px 16px' }}>
              {[['🌱','Sempre\nfresco'],['🛡️','Higienizado\ne seguro'],['🚚','Entrega\nprogramada'],['⏱️','Sem perder\ntempo']].map(([e,l]) => (
                <div key={l} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
                  <div style={{ fontSize:22 }}>{e}</div>
                  <div style={{ fontSize:9.5, textAlign:'center', color:T2, lineHeight:1.3, whiteSpace:'pre-line' }}>{l}</div>
                </div>
              ))}
            </div>

            <Divider />

            <div style={{ padding:'14px 18px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:15, fontWeight:800, color:TXT }}>Mais vendidos</span>
              <button onClick={()=>go('products')} style={{ background:'none', border:'none', fontSize:12, color:G, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>Ver todos</button>
            </div>
            <div style={{ display:'flex', gap:10, padding:'0 14px 16px', overflowX:'auto' }}>
              {featured.map(p => (
                <div key={p.id} style={{ flexShrink:0, width:118, background:'#fff', borderRadius:18, padding:12, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', border:`1px solid ${BD}` }}>
                  <Img p={p} size={76} />
                  <div style={{ marginTop:8, fontSize:12, fontWeight:700, color:TXT, lineHeight:1.3 }}>{p.name}</div>
                  <div style={{ fontSize:10, color:T3, marginTop:1, marginBottom:6 }}>{p.weight}</div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span style={{ fontSize:13, fontWeight:800, color:TXT }}>{fmt(p.price)}</span>
                    <button onClick={()=>add(p.id)} style={{ background:G, border:'none', borderRadius:8, width:27, height:27, color:'#fff', fontSize:17, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>+</button>
                  </div>
                </div>
              ))}
            </div>

            <Divider />

            <div style={{ padding:'14px 18px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:15, fontWeight:800, color:TXT }}>Kits prontos</span>
              <button style={{ background:'none', border:'none', fontSize:12, color:G, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>Ver todos</button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10, padding:'0 14px 14px' }}>
              {KITS.map(k => (
                <div key={k.id} style={{ display:'flex', alignItems:'center', gap:12, background:'#fff', borderRadius:18, padding:14, boxShadow:'0 2px 10px rgba(0,0,0,0.06)', border:`1px solid ${BD}` }}>
                  <div style={{ width:64, height:64, borderRadius:14, background:k.bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:30, flexShrink:0 }}>{k.emoji}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:800, color:TXT }}>{k.name}</div>
                    <div style={{ fontSize:11, color:T3, marginBottom:5, lineHeight:1.4 }}>{k.desc}</div>
                    <div style={{ fontSize:14, fontWeight:800, color:TXT }}>{fmt(k.price)}</div>
                  </div>
                  <button style={{ background:G, border:'none', borderRadius:10, width:34, height:34, color:'#fff', fontSize:20, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>+</button>
                </div>
              ))}
            </div>

            <div style={{ margin:'0 14px', borderRadius:16, background:GL, padding:'13px 16px', display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ fontSize:22 }}>🚚</span>
              <div>
                <div style={{ fontSize:13, fontWeight:800, color:GD }}>Entregamos amanhã!</div>
                <div style={{ fontSize:11, color:G, marginTop:1 }}>Peça até 18h e receba no próximo dia útil.</div>
              </div>
            </div>
          </div>
        );
      };

      // PRODUCTS
      const renderProducts = () => {
        const cats = ['Todos','Legumes','Verduras','Temperos'];
        const filtered = PRODUCTS.filter(p => {
          const mc = catFilter === 'Todos' || p.cat === catFilter.toLowerCase();
          const ms = p.name.toLowerCase().includes(search.toLowerCase());
          return mc && ms;
        });
        return (
          <div style={{ background:'#fff', paddingBottom:16 }}>
            <Header title="Produtos" back backFn={()=>go('home')} right={<CartIcon onClick={()=>go('cart')} />} />
            <div style={{ padding:'12px 14px 0' }}>
              <div style={{ background:BG, borderRadius:13, padding:'10px 14px', display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:15, color:T3 }}>🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produtos..." style={{ background:'none', border:'none', outline:'none', flex:1, fontSize:14, color:TXT, fontFamily:'inherit' }} />
                {search && <button onClick={()=>setSearch('')} style={{ background:'none', border:'none', color:T3, cursor:'pointer', fontSize:16 }}>×</button>}
              </div>
            </div>
            <div style={{ display:'flex', gap:8, padding:'10px 14px', overflowX:'auto' }}>
              {cats.map(c => (
                <button key={c} onClick={()=>setCatFilter(c)} style={{ flexShrink:0, background: catFilter===c ? G : '#F0F0F0', color: catFilter===c ? '#fff' : T2, border:'none', borderRadius:20, padding:'7px 16px', fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>
                  {c}
                </button>
              ))}
            </div>
            <div style={{ padding:'0 14px' }}>
              {filtered.map((p, i) => (
                <div key={p.id}>
                  <div style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 0' }}>
                    <Img p={p} size={72} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:TXT, marginBottom:1 }}>{p.name}</div>
                      <div style={{ fontSize:12, color:T3, marginBottom:6 }}>{p.weight}</div>
                      <div style={{ fontSize:17, fontWeight:900, color:TXT, marginBottom:8 }}>{fmt(p.price)}</div>
                      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <Stepper id={p.id} qty={cart[p.id]||0} />
                        <button onClick={()=>add(p.id)} style={{ background:G, border:'none', borderRadius:10, padding:'8px 14px', fontSize:12, fontWeight:800, color:'#fff', cursor:'pointer', fontFamily:'inherit' }}>
                          Adicionar
                        </button>
                      </div>
                    </div>
                  </div>
                  {i < filtered.length-1 && <Divider />}
                </div>
              ))}
              {filtered.length === 0 && (
                <div style={{ textAlign:'center', padding:'40px 0', color:T3 }}>
                  <div style={{ fontSize:40, marginBottom:10 }}>🔍</div>
                  <div style={{ fontSize:14 }}>Nenhum produto encontrado</div>
                </div>
              )}
            </div>
            <div style={{ margin:'12px 14px 0', borderRadius:12, background:GL, padding:'10px 14px', display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:14 }}>⏱️</span>
              <span style={{ fontSize:12, color:GD, fontWeight:600 }}>Pedidos até 18h para entrega no próximo dia útil.</span>
            </div>
          </div>
        );
      };

      // CART
      const renderCart = () => {
        if (cartItems.length === 0) return (
          <div style={{ background:'#fff', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, gap:14, minHeight:500 }}>
            <div style={{ fontSize:56 }}>🛒</div>
            <div style={{ fontSize:17, fontWeight:800, color:TXT }}>Carrinho vazio</div>
            <div style={{ fontSize:13, color:T3, textAlign:'center', lineHeight:1.5 }}>Adicione produtos deliciosos para começar!</div>
            <button onClick={()=>go('products')} style={{ background:G, border:'none', borderRadius:14, padding:'13px 30px', fontSize:14, fontWeight:800, color:'#fff', cursor:'pointer', fontFamily:'inherit' }}>Ver produtos</button>
          </div>
        );
        const suggested = PRODUCTS.filter(p => !(cart[p.id]>0)).slice(0, 3);
        return (
          <div style={{ background:BG, paddingBottom:16 }}>
            <Header title="Seu pedido" back backFn={()=>go('products')} right={<span style={{ fontSize:12, color:T3, fontWeight:600 }}>{cartCount} {cartCount===1?'item':'itens'}</span>} />
            <div style={{ margin:'12px 14px', borderRadius:14, background:GL, padding:'12px 16px', display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:20 }}>🚚</span>
              <div>
                <div style={{ fontSize:12, fontWeight:800, color:GD }}>Entrega programada</div>
                <div style={{ fontSize:11, color:G }}>Receba amanhã · Pedidos até 18h</div>
              </div>
            </div>
            <div style={{ background:'#fff', borderRadius:18, margin:'0 14px', overflow:'hidden' }}>
              {cartItems.map((item, i) => (
                <div key={item.id}>
                  <div style={{ display:'flex', gap:12, padding:'14px', alignItems:'flex-start' }}>
                    <Img p={item} size={58} />
                    <div style={{ flex:1 }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                        <div>
                          <div style={{ fontSize:13, fontWeight:700, color:TXT, lineHeight:1.3 }}>{item.name}</div>
                          <div style={{ fontSize:11, color:T3 }}>{item.weight}</div>
                          <div style={{ fontSize:12, color:T2, marginTop:2 }}>{fmt(item.price)}</div>
                        </div>
                        <button onClick={()=>rm(item.id)} style={{ background:'none', border:'none', fontSize:15, cursor:'pointer', color:T3, padding:'2px 0 0 8px' }}>🗑️</button>
                      </div>
                      <div style={{ marginTop:10, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                        <Stepper id={item.id} qty={item.qty} />
                        <span style={{ fontSize:15, fontWeight:900, color:GD }}>{fmt(item.price * item.qty)}</span>
                      </div>
                    </div>
                  </div>
                  {i < cartItems.length-1 && <div style={{ height:1, background:BD, margin:'0 14px' }} />}
                </div>
              ))}
            </div>
            <div style={{ background:'#fff', borderRadius:18, margin:'10px 14px', padding:'14px' }}>
              {[['Subtotal', fmt(cartTotal)], ['Taxa de entrega','Grátis']].map(([l,v],i) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                  <span style={{ fontSize:13, color:T2 }}>{l}</span>
                  <span style={{ fontSize:13, color: l==='Taxa de entrega' ? G : TXT, fontWeight: l==='Taxa de entrega' ? 700 : 400 }}>{v}</span>
                </div>
              ))}
              <div style={{ height:1, background:BD, margin:'10px 0' }} />
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:15, fontWeight:800, color:TXT }}>Total</span>
                <span style={{ fontSize:22, fontWeight:900, color:GD }}>{fmt(cartTotal)}</span>
              </div>
            </div>
            <div style={{ padding:'4px 14px 12px' }}>
              <GreenBtn label="FINALIZAR PEDIDO" onClick={()=>go('checkout')} />
            </div>
            {suggested.length > 0 && (
              <>
                <div style={{ padding:'4px 18px 10px', fontSize:14, fontWeight:800, color:TXT }}>Você também pode gostar</div>
                <div style={{ display:'flex', gap:10, padding:'0 14px', overflowX:'auto' }}>
                  {suggested.map(p => (
                    <div key={p.id} style={{ flexShrink:0, width:100, background:'#fff', borderRadius:16, padding:'10px', boxShadow:'0 2px 8px rgba(0,0,0,0.07)', border:`1px solid ${BD}` }}>
                      <Img p={p} size={64} />
                      <div style={{ marginTop:6, fontSize:11, fontWeight:700, color:TXT, lineHeight:1.3 }}>{p.name}</div>
                      <div style={{ fontSize:10, color:T3 }}>{p.weight}</div>
                      <div style={{ marginTop:5, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                        <span style={{ fontSize:11, fontWeight:800, color:TXT }}>{fmt(p.price)}</span>
                        <button onClick={()=>add(p.id)} style={{ background:G, border:'none', borderRadius:7, width:22, height:22, color:'#fff', fontSize:15, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        );
      };

      // CHECKOUT
      const renderCheckout = () => {
        const STEPS = ['Entrega','Pagamento','Confirmação'];
        const StepBar = () => (
          <div style={{ display:'flex', alignItems:'center', padding:'14px 22px 10px' }}>
            {STEPS.map((s,i) => (
              <div key={s} style={{ display:'flex', alignItems:'center', flex: i < STEPS.length-1 ? 1 : 0 }}>
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                  <div style={{ width:28, height:28, borderRadius:'50%', background: step > i+1 ? G : step===i+1 ? G : BD, color: step>=i+1 ? '#fff' : T3, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:800 }}>
                    {step > i+1 ? '✓' : i+1}
                  </div>
                  <span style={{ fontSize:10, color: step>=i+1 ? G : T3, fontWeight: step===i+1 ? 800 : 400, whiteSpace:'nowrap' }}>{s}</span>
                </div>
                {i < STEPS.length-1 && <div style={{ flex:1, height:2, background: step>i+1 ? G : BD, margin:'0 6px', marginBottom:16 }} />}
              </div>
            ))}
          </div>
        );

        const Field = ({ label, placeholder, field, type='text', half=false }) => (
          <div style={{ marginBottom:13, flex: half ? '0 0 calc(50% - 5px)' : '1 1 100%' }}>
            <label style={{ fontSize:12, fontWeight:700, color:T2, display:'block', marginBottom:4 }}>{label}</label>
            <input type={type} value={form[field]||''} onChange={e=>upd(field,e.target.value)} placeholder={placeholder}
              style={{ width:'100%', boxSizing:'border-box', border:`1.5px solid ${BD}`, borderRadius:11, padding:'11px 13px', fontSize:14, color:TXT, background:'#fff', outline:'none', fontFamily:'inherit' }} />
          </div>
        );

        const step1ok = form.name && form.phone && form.address && form.delivery;
        const step2ok = form.payment;

        const renderStep1 = () => (
          <div style={{ padding:'0 14px 16px' }}>
            <div style={{ fontSize:14, fontWeight:800, color:TXT, marginBottom:14 }}>Endereço de entrega</div>
            <Field label="Nome completo" placeholder="Digite seu nome" field="name" />
            <Field label="Telefone" placeholder="(11) 99999-9999" field="phone" type="tel" />
            <Field label="Endereço" placeholder="Digite seu endereço" field="address" />
            <div style={{ display:'flex', gap:10 }}>
              <Field label="Número" placeholder="Ex: 123" field="number" half />
              <Field label="Complemento" placeholder="Apto, Bloco (opcional)" field="complement" half />
            </div>
            <Field label="Bairro" placeholder="Seu bairro" field="bairro" />
            <div style={{ marginBottom:18 }}>
              <label style={{ fontSize:12, fontWeight:700, color:T2, display:'block', marginBottom:8 }}>Data de entrega</label>
              <div style={{ display:'flex', gap:8 }}>
                {DATES.map(d => (
                  <button key={d.val} onClick={()=>upd('delivery',d.val)} style={{ flex:1, background: form.delivery===d.val ? GL : '#fff', border:`1.5px solid ${form.delivery===d.val ? G : BD}`, borderRadius:11, padding:'8px 4px', cursor:'pointer', fontFamily:'inherit' }}>
                    <div style={{ fontSize:11, fontWeight:800, color: form.delivery===d.val ? GD : T2 }}>{d.label}</div>
                    <div style={{ fontSize:10, color: form.delivery===d.val ? G : T3 }}>{d.sub}</div>
                  </button>
                ))}
              </div>
            </div>
            <GreenBtn label="CONTINUAR" onClick={()=>step1ok && setStep(2)} disabled={!step1ok} />
          </div>
        );

        const renderStep2 = () => (
          <div style={{ padding:'0 14px 16px' }}>
            <div style={{ fontSize:14, fontWeight:800, color:TXT, marginBottom:14 }}>Forma de pagamento</div>
            {[{val:'pix',label:'Pix',sub:'Pagamento instantâneo',icon:'💚'},{val:'dinheiro',label:'Dinheiro',sub:'Pagamento na entrega',icon:'💵'}].map(pm => (
              <button key={pm.val} onClick={()=>upd('payment',pm.val)} style={{ width:'100%', display:'flex', alignItems:'center', gap:14, background: form.payment===pm.val ? GL : '#fff', border:`2px solid ${form.payment===pm.val ? G : BD}`, borderRadius:16, padding:'14px', marginBottom:10, cursor:'pointer', textAlign:'left', boxSizing:'border-box', fontFamily:'inherit' }}>
                <span style={{ fontSize:26 }}>{pm.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:800, color:TXT }}>{pm.label}</div>
                  <div style={{ fontSize:12, color:T3 }}>{pm.sub}</div>
                </div>
                <div style={{ width:20, height:20, borderRadius:'50%', border:`2px solid ${form.payment===pm.val ? G : BD}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  {form.payment===pm.val && <div style={{ width:10, height:10, borderRadius:'50%', background:G }} />}
                </div>
              </button>
            ))}
            <div style={{ background:BG, borderRadius:14, padding:'14px', marginTop:4, marginBottom:16 }}>
              <div style={{ fontSize:12, fontWeight:800, color:T2, marginBottom:8 }}>Resumo</div>
              {cartItems.map(i => (
                <div key={i.id} style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                  <span style={{ fontSize:12, color:T2 }}>{i.qty}× {i.name}</span>
                  <span style={{ fontSize:12, color:TXT, fontWeight:600 }}>{fmt(i.price*i.qty)}</span>
                </div>
              ))}
              <div style={{ height:1, background:BD, margin:'8px 0' }} />
              <div style={{ display:'flex', justifyContent:'space-between' }}>
                <span style={{ fontSize:13, fontWeight:800, color:TXT }}>Total</span>
                <span style={{ fontSize:13, fontWeight:900, color:GD }}>{fmt(cartTotal)}</span>
              </div>
            </div>
            <GreenBtn label="CONTINUAR" onClick={()=>step2ok && setStep(3)} disabled={!step2ok} />
            <button onClick={()=>setStep(1)} style={{ width:'100%', background:'none', border:'none', fontSize:13, color:T3, cursor:'pointer', padding:'10px', fontFamily:'inherit', marginTop:4 }}>Voltar</button>
          </div>
        );

        const renderStep3 = () => {
          const dl = DATES.find(d => d.val === form.delivery);
          return (
            <div style={{ padding:'0 14px 16px' }}>
              <div style={{ fontSize:14, fontWeight:800, color:TXT, marginBottom:14 }}>Resumo do pedido</div>
              <div style={{ background:'#fff', borderRadius:16, padding:'14px', marginBottom:10 }}>
                {cartItems.map(i => (
                  <div key={i.id} style={{ display:'flex', justifyContent:'space-between', marginBottom:7 }}>
                    <span style={{ fontSize:12, color:T2 }}>{i.name} ({i.weight})</span>
                    <span style={{ fontSize:12, fontWeight:700, color:TXT }}>{i.qty}× {fmt(i.price*i.qty)}</span>
                  </div>
                ))}
                <div style={{ height:1, background:BD, margin:'8px 0' }} />
                <div style={{ display:'flex', justifyContent:'space-between' }}>
                  <span style={{ fontSize:12, color:T2 }}>Taxa de entrega</span>
                  <span style={{ fontSize:12, fontWeight:700, color:G }}>Grátis</span>
                </div>
              </div>
              <div style={{ background:'#fff', borderRadius:16, padding:'14px', marginBottom:10 }}>
                <div style={{ fontSize:12, fontWeight:800, color:T3, marginBottom:6 }}>ENDEREÇO DE ENTREGA</div>
                <div style={{ fontSize:13, color:TXT, lineHeight:1.6 }}>
                  {form.name}<br/>{form.phone}<br/>
                  {form.address}{form.number?`, ${form.number}`:''}{form.complement?` – ${form.complement}`:''}<br/>
                  {form.bairro?`${form.bairro} · `:''}São Paulo – SP<br/>
                  <span style={{ color:G, fontWeight:700 }}>Entrega: {dl?.label||'Amanhã'} ({dl?.sub||'21/05'})</span>
                </div>
              </div>
              <div style={{ background:'#fff', borderRadius:16, padding:'14px', marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:800, color:T3, marginBottom:4 }}>PAGAMENTO</div>
                <div style={{ fontSize:14, color:TXT, fontWeight:600 }}>{form.payment==='pix'?'💚 Pix':'💵 Dinheiro na entrega'}</div>
              </div>
              <div style={{ background:GL, borderRadius:16, padding:'14px 16px', marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:15, fontWeight:800, color:GD }}>Total</span>
                <span style={{ fontSize:24, fontWeight:900, color:GD }}>{fmt(cartTotal)}</span>
              </div>
              <GreenBtn label="CONFIRMAR PEDIDO" onClick={()=>{ setCart({}); go('success'); }} />
              <button onClick={()=>setStep(2)} style={{ width:'100%', background:'none', border:'none', fontSize:13, color:T3, cursor:'pointer', padding:'10px', fontFamily:'inherit', marginTop:4 }}>Voltar</button>
            </div>
          );
        };

        return (
          <div style={{ background:BG, minHeight:'100%' }}>
            <Header title="Finalizar pedido" back backFn={()=>step===1?go('cart'):setStep(s=>s-1)} right={null} />
            <StepBar />
            {step===1 && renderStep1()}
            {step===2 && renderStep2()}
            {step===3 && renderStep3()}
          </div>
        );
      };

      // SUCCESS
      const renderSuccess = () => (
        <div style={{ background:'#fff', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, gap:16, minHeight:550, textAlign:'center' }}>
          <div style={{ width:88, height:88, borderRadius:'50%', background:GL, display:'flex', alignItems:'center', justifyContent:'center', fontSize:44 }}>✅</div>
          <div style={{ fontSize:22, fontWeight:900, color:TXT }}>Pedido confirmado!</div>
          <div style={{ fontSize:13, color:T3, lineHeight:1.6, maxWidth:240 }}>Seu pedido foi recebido com sucesso. Em breve você receberá a confirmação.</div>
          <div style={{ background:GL, borderRadius:16, padding:'16px 20px', width:'100%', boxSizing:'border-box' }}>
            <div style={{ fontSize:14, fontWeight:800, color:GD }}>🚚 Entrega programada</div>
            <div style={{ fontSize:12, color:G, marginTop:3 }}>Chegará amanhã até as 18h</div>
          </div>
          <button onClick={()=>go('home')} style={{ background:G, border:'none', borderRadius:14, padding:'14px 36px', fontSize:14, fontWeight:800, color:'#fff', cursor:'pointer', fontFamily:'inherit', marginTop:4 }}>
            Voltar ao início
          </button>
        </div>
      );

      const NAV = [['home','🏠','Início'],['products','🥦','Produtos'],['cart','🛒','Pedidos'],['profile','👤','Perfil']];

      return (
        <div style={{ display:'flex', justifyContent:'center', alignItems:'flex-start', padding:'20px 12px', minHeight:'100vh', background:'#DFE4DF', fontFamily:'-apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif' }}>
          <div style={{ width:375, maxWidth:'100%', borderRadius:44, overflow:'hidden', boxShadow:'0 24px 80px rgba(0,0,0,0.28), 0 0 0 11px #111', display:'flex', flexDirection:'column', background:'#fff', maxHeight:'90vh', minHeight:700 }}>
            <div style={{ background:'#fff', padding:'13px 24px 5px', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
              <span style={{ fontSize:13, fontWeight:700, color:TXT }}>9:41</span>
              <div style={{ display:'flex', gap:5, alignItems:'center' }}>
                <span style={{ fontSize:11, fontWeight:600, color:TXT }}>▪▪▪</span>
                <span style={{ fontSize:11, color:TXT }}>WiFi</span>
                <span style={{ fontSize:13 }}>🔋</span>
              </div>
            </div>
            <div style={{ flex:1, overflowY:'auto', minHeight:0 }}>
              {screen==='home'     && renderHome()}
              {screen==='products' && renderProducts()}
              {screen==='cart'     && renderCart()}
              {screen==='checkout' && renderCheckout()}
              {screen==='success'  && renderSuccess()}
            </div>
            {screen !== 'success' && (
              <div style={{ background:'#fff', borderTop:`1px solid ${BD}`, display:'flex', flexShrink:0, paddingBottom:10 }}>
                {NAV.map(([s,icon,label]) => (
                  <button key={s} onClick={()=>go(s)} style={{ flex:1, background:'none', border:'none', padding:'8px 0 2px', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, color: screen===s ? G : T3, fontFamily:'inherit' }}>
                    <span style={{ fontSize:21 }}>{icon}</span>
                    <span style={{ fontSize:10, fontWeight: screen===s ? 800 : 400 }}>{label}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
